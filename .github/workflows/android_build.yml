name: Android Build

on:
  push:
    branches:
      - '**'  # Trigger on push to any branch
    tags:
      - 'v*'  # Trigger on version tags for releases
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Build & sign a release APK (even on feature branches)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build-debug:
    # Build debug APK for all feature branches --> and not main (skip if manually forcing a release build)
    if: >
      !startsWith(github.ref, 'refs/tags/') &&
      github.ref_name != 'master' &&
      github.event.inputs.force_release != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: 8.10 }
      - uses: nttld/setup-ndk@v1.2.0
        with: { ndk-version: r25c }
      - run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VIEWA-debug
          path: app/build/outputs/apk/debug/*.apk

  build-release:
    # Build release APK for main branch, version tags, or when manually triggered with force_release=true
    if: >
      github.ref_name == 'master' ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event.inputs.force_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create GitHub Releases

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: 8.10 }
      - uses: nttld/setup-ndk@v1.2.0
        with: { ndk-version: r25c }
      - run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Sign app APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VIEWA-release
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
          generate_release_notes: true
          name: "Viewa ${{ github.ref_name }}"

